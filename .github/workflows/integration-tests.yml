name: Integration tests

on:
  push:
  pull_request:

jobs:
  kubo-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install latest Kubo
        shell: bash
        run: |
          set -euo pipefail
          version="$(curl -fsSL https://api.github.com/repos/ipfs/kubo/releases/latest | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"].lstrip("v"))')"
          curl -fsSLO "https://github.com/ipfs/kubo/releases/download/v${version}/kubo_v${version}_linux-amd64.tar.gz"
          tar -xzf "kubo_v${version}_linux-amd64.tar.gz"
          sudo install -m 0755 kubo/ipfs /usr/local/bin/ipfs
          ipfs version

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_kubo_api_client.py'

      - name: Run Kubo integration tests
        run: python -m unittest discover -s tests -p 'test_kubo_api_client_integration.py'
