name: Integration tests

on:
  push:
  pull_request:

jobs:
  fast-unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.9'
          - '3.x'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_kubo_api_client.py'

  kubo-integration:
    runs-on: ubuntu-latest
    env:
      KUBO_VERSION: ${{ vars.KUBO_VERSION || '0.42.0' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install official Kubo release
        shell: bash
        run: |
          set -euo pipefail

          KUBO_VERSION="${KUBO_VERSION:-0.42.0}"
          KUBO_VERSION="${KUBO_VERSION#v}"
          echo "Selected Kubo version: ${KUBO_VERSION}"

          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          arch="$(uname -m)"
          case "${os}-${arch}" in
              linux-x86_64|linux-amd64)
                  platform="linux-amd64"
                  ;;
              linux-aarch64|linux-arm64)
                  platform="linux-arm64"
                  ;;
              *)
                  echo "Unsupported Kubo integration platform: ${os}-${arch}" >&2
                  exit 1
                  ;;
          esac

          asset="kubo_v${KUBO_VERSION}_${platform}.tar.gz"
          checksum="${asset}.sha512"
          base_url="https://github.com/ipfs/kubo/releases/download/v${KUBO_VERSION}"
          workdir="${RUNNER_TEMP}/kubo-${KUBO_VERSION}"
          mkdir -p "${workdir}"
          cd "${workdir}"

          curl --fail --location --retry 3 --output "${asset}" "${base_url}/${asset}"
          curl --fail --location --retry 3 --output "${checksum}" "${base_url}/${checksum}"
          sha512sum --check "${checksum}"

          tar -xzf "${asset}"
          kubo_dir="${workdir}/kubo"
          echo "${kubo_dir}" >> "${GITHUB_PATH}"
          "${kubo_dir}/ipfs" version
          reported="$("${kubo_dir}/ipfs" version --number)"
          if [[ "${reported}" != "${KUBO_VERSION}" ]]; then
              echo "Kubo version mismatch: requested ${KUBO_VERSION}, got ${reported}" >&2
              exit 1
          fi

      - name: Run Kubo integration tests
        run: python -m unittest discover -s tests -p 'test_kubo_api_client_integration.py'
